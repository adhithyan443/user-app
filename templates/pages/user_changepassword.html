<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Dashboard</title>

    <!-- BS5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- <style>
        body{
            height: 100vh;
        }
    </style> -->
</head>

<body class="bg-light d-flex flex-column min-vh-100">

    {{if .message}}
    <script>
        alert("{{.message}}");
    </script>
    {{end}}

    <nav class="navbar navbar-expand-lg  bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand text-light fw-bold fs-4" href="/home">
                <i class="fas fa-home me-2"></i>
                MyApp
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>


            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                </ul>
                <form class="d-flex flex-end">
                    <!-- <span class="text-white fw-medium me-3">
                        Welcome, <strong>{{ .user.Name }}</strong> 👋
                    </span> -->
                    <a class="btn btn-outline-light btn-sm px-3" href="/logout">
                        <!-- <button class="btn btn-outline-light btn-sm px-3"> -->
                        <i class="fas fa-sign-out-alt"></i>
                        Logout
                        <!-- </button> -->
                    </a>

                </form>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="col-12">
            <div class="bg-white rounded-3 shadow p-5">
                <h2 class="display-5 fw-bold text-primary">Password</h2>
                <form method="post" action="/password" class="p-5">

                    <div class="row mb-3">
                        <label class="col-sm-2 col-form-label">Current Password</label>
                        <div class="col-sm-10">
                            <input type="password" class="form-control" name="oldpassword" placeholder="Enter current password" required>
                        </div>
                    </div>
                    <div class="row mb-3">
                        <label class="col-sm-2 col-form-label">New Password</label>
                        <div class="col-sm-10">
                            <input type="password" class="form-control" name="newpassword" minlength="6"
                                placeholder="Enter new password" required>
                        </div>
                    </div>
                    <div class="row mb-3">
                        <label class="col-sm-2 col-form-label">Confirm New Password</label>
                        <div class="col-sm-10">
                            <input type="password" class="form-control" name="confirmpassword" minlength="6"
                                placeholder="Confirm new password" required>
                        </div>
                    </div>
                    {{if .error}}
                    <div class="row mb-3">
                        <span class="col-12 col-form-label text-danger">{{.error}}</span>
                    </div>
                    {{end}}
                    <button type="submit" class="btn btn-primary">Change Password</button>
                </form>
            </div>
        </div>

    </div>

    <!-- Footer -->
    <footer class="bg-white py-4 border-top mt-auto">
        <div class="container text-center text-muted">
            <small>&copy; 2026 MyApp - Built with Go + Gin</small>
        </div>
    </footer>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
