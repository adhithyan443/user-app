<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Dashboard</title>

    <!-- BS5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="bg-light">

    <nav class="navbar navbar-expand-lg  bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand text-light fw-bold fs-4" href="#">
                <i class="fas fa-home me-2"></i>
                MyApp
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>


            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <!-- <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="#">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Link</a>
                    </li> -->
                </ul>
                <form class="d-flex flex-end">
                    <span class="text-white fw-medium me-3">
                        Welcome, <strong>{{ .name }}</strong> 👋
                    </span>
                    <a class="btn btn-outline-light btn-sm px-3" href="/logout">
                        <!-- <button class="btn btn-outline-light btn-sm px-3"> -->
                            <i class="fas fa-sign-out-alt"></i>
                            Logout
                        <!-- </button> -->
                    </a>

                </form>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="col-12">
            <div class="bg-white rounded-3 shadow p-5 text-center">
                <h1 class="display-5 fw-bold text-primary">Hello, {{ .name }}</h1>
                <p class="lead  mt-2">Welcome back to your personal dashboard</p>
                <hr>
                <p class="fs-5">What would you like to do today?</p>
            </div>
        </div>

        <div class="row py-4">
            <!-- Card 1 -->
            <div class="col-md-4 col-lg-6">
                <div class="card h-100 shadow-sm border-0 hover-card">
                    <div class="card-body text-center p-5">
                        <i class="fas fa-user-circle fa-4x text-primary mb-4"></i>
                        <h4 class="card-title">My Profile</h4>
                        <p class="card-text text-muted">Update your personal information and preferences.</p>
                        <a href="#" class="btn btn-primary mt-3 px-4">Go to Profile</a>
                    </div>
                </div>
            </div>

            <!-- Card 2 -->
            <div class="col-md-4 col-lg-6">
                <div class="card h-100 shadow-sm border-0 hover-card">
                    <div class="card-body text-center p-5">
                        <i class="fas fa-key fa-4x text-success mb-4"></i>
                        <h4 class="card-title">Change Password</h4>
                        <p class="card-text text-muted">Update your password.</p>
                        <a href="#" class="btn btn-success mt-3 px-4">Update</a>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-white py-4 mt-4 border-top">
        <div class="container text-center text-muted">
            <small>&copy; 2026 MyApp - Built with Go + Gin</small>
        </div>
    </footer>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
