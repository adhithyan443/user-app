<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Dashboard</title>

    <!-- BS5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        .sidebar {
            min-height: 100vh;
            background: #343a40;
        }
    </style>

</head>

<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="/admin">
                <i class="fas fa-shield-alt me-2"></i>Admin Panel
            </a>

            <div class="d-flex align-items-center gap-3">
                <span class="text-light">
                    <i class="fas fa-user-shield"></i>
                    Welcome, <strong>Admin</strong>
                </span>
                <a href="/logout" class="btn btn-danger btn-sm"
                    onclick="return confirm('Are you sure you want to logout?')">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </a>
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <div class="col-md-3 col-lg-2 sidebar p-3">
                <ul class="nav flex-column">
                    <li class="nav-item mb-2">
                        <a href="/admin" class="nav-link active ">
                            <i class="fas fa-tachometer-alt me-2 text-light"></i> <span class="text-light">
                                Dashboard</span>
                        </a>
                    </li>
                    <li class="nav-item mb-2">
                        <a href="/admin/users" class="nav-link">
                            <i class="fas fa-users me-2 text-light"></i><span class="text-light"> Users </span>
                        </a>
                    </li>
                </ul>
            </div>
            <div class="col-md-9 col-lg-10 p-4">

                <h2 class="h2 mb-4">Admin Dashboard</h2>

                <div class="row g-4 mb-5">
                    <div class="col-md-3">
                        <div class="card stat-card bg-white shadow-sm">
                            <div class="card-body">
                                <h5 class="text-muted">Total Users</h5>
                                <h2 class="fw-bold text-primary">{{.Count}}</h2>
                                <!-- <p class="text-success small"><i class="fas fa-arrow-up"></i> 12% this month</p> -->
                            </div>
                        </div>
                    </div>
                </div>

                <div class="row g-4">
                    <!-- Quick Actions -->
                    <div class="col-lg-6">
                        <div class="card shadow-sm">
                            <div class="card-header bg-white">
                                <h5 class="mb-0"><i class="fas fa-bolt"></i> Quick Actions</h5>
                            </div>
                            <div class="card-body">
                                <div class="d-grid gap-3">
                                    <a href="/admin/newuser" class="btn btn-primary btn-lg">
                                        Add New User
                                    </a>
                                    <a href="/admin/users" class="btn btn-danger btn-lg">
                                        Remove a User</a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
