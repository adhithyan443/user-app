<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | MyApp</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <div class="container">
        <div class="card" style="width: 30%;">
            <h1 class="title">Create Account</h1>
            <p class="subtitle">Join us today</p>

            <form action="/signup" method="POST" class="auth-form">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" required placeholder="Enter your full name" autofocus minlength="3">
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required placeholder="you@example.com">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="Create a strong password"
                        minlength="6">
                </div>

                {{if .error}}
                <div class="error-message">
                    {{.error}}
                </div>
                {{end}}

                <button type="submit" class="btn-sigin">Create Account</button>
            </form>

            <div class="login-footer">
                Already have an account?
                <a href="/login">Login here</a>
            </div>
        </div>
    </div>
</body>

</html>
