<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Dashboard</title>

    <!-- BS5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        .sidebar {
            min-height: 100vh;
            background: #343a40;
        }
    </style>

</head>

<body class="bg-light">
    {{if .message}}
    <script>
        alert("{{.message}}");
    </script>
    {{end}}
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="/admin">
                <i class="fas fa-shield-alt me-2"></i>Admin Panel
            </a>

            <div class="d-flex align-items-center gap-3">
                <span class="text-light">
                    <i class="fas fa-user-shield"></i>
                    Welcome, <strong> Admin</strong>
                </span>
                <a href="/logout" class="btn btn-danger btn-sm"
                    onclick="return confirm('Are you sure you want to logout?')">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </a>
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <div class="col-md-3 col-lg-2 sidebar p-3">
                <ul class="nav flex-column">
                    <li class="nav-item mb-2">
                        <a href="/admin" class="nav-link active ">
                            <i class="fas fa-tachometer-alt me-2 text-light"></i> <span class="text-light">
                                Dashboard</span>
                        </a>
                    </li>
                    <li class="nav-item mb-2">
                        <a href="#" class="nav-link">
                            <i class="fas fa-users me-2 text-light"></i><span class="text-light"> Users </span>
                        </a>
                    </li>
                </ul>
            </div>
            <div class="col-md-9 col-lg-10 p-4 ">

                <div class="row">

                    <div class="col-6">
                        <h2 class="h2 mb-4">All Users</h2>
                    </div>
                    <div class="col-6">
                        <form method="GET" action="/admin/users" class="d-flex justify-content-end mb-3">
                            <input type="text" name="search" class="form-control w-50" placeholder="Search users by name or email..."
                                value="{{.search}}">
                            <button type="submit" class="btn btn-primary ms-2">Search</button>
                        </form>

                    </div>


                </div>

                <div class="container ">

                    <table class="table table-hover shadow">
                        <thead>
                            <tr>
                                <th scope="col">#</th>
                                <th scope="col">Name</th>
                                <th scope="col">Email</th>
                                <th scope="col">Role</th>
                                <th scope="col" colspan=2>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            {{range $index,$user := .users}}

                            <tr>
                                <th scope="row">{{add $index 1}}</th>
                                <td>{{ $user.Name}}</td>
                                <td>{{ $user.Email}}</td>
                                <td>
                                    {{if eq $user.Role "admin"}}
                                    <span class="badge bg-danger">Admin</span>
                                    {{else}}
                                    <span class="badge bg-secondary">User</span>
                                    {{end}}
                                </td>
                                <td><a href="/admin/users/edit/{{ $user.ID }}" class="btn btn-outline-primary">Edit</a>
                                </td>
                                <td><a href="/admin/users/delete/{{ $user.ID }}" class="btn btn-outline-danger"
                                        onclick="return confirm('Are you sure you want to delete this user?')">
                                        Delete
                                    </a>
                                </td>
                            </tr>
                            {{end}}
                        </tbody>
                    </table>

                </div>

            </div>

        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
